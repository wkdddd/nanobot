<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="nanobot Review Agent — 代码审查工作台" />
    <meta name="theme-color" content="#FAF9F5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#262624" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/jpeg" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #FAF9F5;
        color: #3D3929;
        font-family:
          "Poppins",
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Noto Sans", "Noto Sans SC", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      html.dark body {
        background: #262624;
        color: #f1f1ef;
      }

      .boot-splash {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }

      .boot-splash-inner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(61, 57, 41, 0.64);
        font-size: 14px;
      }

      html.dark .boot-splash-inner {
        color: rgba(241, 241, 239, 0.64);
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #C96442;
        opacity: 0.75;
        animation: boot-pulse 1s ease-in-out infinite;
      }

      @keyframes boot-pulse {
        0%, 100% { transform: scale(0.9); opacity: 0.45; }
        50% { transform: scale(1); opacity: 0.85; }
      }
    </style>
    <script>
      // Apply saved theme class to <html> BEFORE React loads, to prevent flash
      (function() {
        try {
          var t = localStorage.getItem("nanobot-review-webui.theme");
          if (t === "dark") document.documentElement.classList.add("dark");
          else if (t === "system") {
            if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
              document.documentElement.classList.add("dark");
            }
          }
        } catch(e) {}
      })();
    </script>
    <title>Review Agent</title>
  </head>
  <body class="antialiased">
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash-inner">
          <span class="boot-dot" aria-hidden="true"></span>
          <span>Loading Review Agent...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
